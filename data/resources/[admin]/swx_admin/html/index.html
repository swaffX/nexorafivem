<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWX Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="admin-panel">
        <!-- Header -->
        <div class="panel-header">
            <div class="header-content">
                <h1 class="panel-title">
                    <span class="title-glow">SWX</span> ADMIN
                </h1>
                <div class="header-stats">
                    <div class="stat-item">
                        <span class="stat-label">ONLINE</span>
                        <span class="stat-value" id="player-count">0</span>
                    </div>
                    <button class="refresh-btn" id="refresh-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6"/>
                            <path d="M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="close-btn" id="close-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- Player List -->
        <div class="player-list-container">
            <div class="list-header">
                <div class="header-column column-id">ID</div>
                <div class="header-column column-name">OYUNCU</div>
                <div class="header-column column-job">İŞ</div>
                <div class="header-column column-money">PARA</div>
                <div class="header-column column-ping">PING</div>
            </div>
            <div class="player-list" id="player-list">
                <!-- Players will be dynamically added here -->
            </div>
        </div>

        <!-- Player Details Modal -->
        <div class="player-modal" id="player-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title" id="modal-player-name">OYUNCU DETAYLARI</h2>
                    <button class="modal-close-btn" id="modal-close-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body" id="modal-body">
                    <!-- Player details will be dynamically added here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
