<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <title></title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body style="display: none">
    <div class="left-png"></div>
    <div class="right-png"></div>
    <div class="bottom-png"></div>
    <div class="changecamera" onclick="changecamera()"></div>
    <div class="top-section">
      <div class="left-section">
        <div class="l-top">
          <div class="l-title">Tuning</div>
          <div class="l-spell">atolye</div>
        </div>
        <div class="l-desc">
          Aracınızı özelleştirin. Motor, fren, renk ve daha fazlası için profesyonel tuning hizmeti.
        </div>
        <div class="l-items"></div>
      </div>
      <div class="right-section">
        <div class="close-btn" onclick="closex()">
          <div class="cb-blur"></div>
          <div class="cb-title">MENÜYÜ KAPAT</div>
          <div class="cb-icon"><img src="./imgs/close.svg" /></div>
        </div>
        <div class="helper">
          <div>
            <span>Serbest Kamera</span><img src="./imgs/mouse1.svg" />
          </div>
          <div><span>Kamerayı Değiştir</span><img src="./imgs/mouse2.svg" /></div>
        </div>
        <div class="total-price">
          <div class="tp-top">
            <div class="tp-label">SEÇİLEN ÜRÜN FİYATI :</div>
            <div class="tp-price">$ 0</div>
          </div>
          <div class="tp-btn" onclick="BuyItem()">SATIN AL</div>
        </div>
      </div>
    </div>
    <div class="bottom-section">
      <div class="b-items"></div>
    </div>
    <audio id="myAudio">
      <source src="./drill.mp3" type="audio/mpeg" />
    </audio>
    <script src="nui://game/ui/jque ry.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./js/script.js"></script>
    <script src="./js/slider.js"></script>
  </body>
</html>
