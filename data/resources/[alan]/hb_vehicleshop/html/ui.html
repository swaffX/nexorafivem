<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" type="text/css" href="css/main.css" />
        <script src="/config/translation.js" type="text/javascript"></script>
        <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
        <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body style="display: none">
        <div class="background">
            <div class="main-screen">
                <div class="vehicleshop-header">
                    <div class="vehicleshop-categories">
                        
                    </div>
                </div>
                <div class="searchBar" id="searchBar">
                        <input id="search-bar" class="search-bar">
                        
                  <div class="vehicle-list"></div>

                <div class="right-bar">
                    <div class="color-text">
                        <div></div>
                    </div>
                   
                    <div class="color-table">
                        <!-- Beyaz - Parlak Beyaz -->
<div class="color-selector" onclick="changeColor(240, 240, 240, 111)" style="background:rgb(240, 240, 240)"></div>

<!-- Siyah - Metalik Siyah -->
<div class="color-selector" onclick="changeColor(25, 25, 25, 147)" style="background:rgb(25, 25, 25)"></div>

<!-- Gri - Graphite Gri -->
<div class="color-selector" onclick="changeColor(90, 90, 90, 120)" style="background:rgb(90, 90, 90)"></div>

<!-- Gümüş - Silver -->
<div class="color-selector" onclick="changeColor(180, 180, 180, 100)" style="background:rgb(180, 180, 180)"></div>

<!-- Lacivert - Midnight Blue -->
<div class="color-selector" onclick="changeColor(30, 40, 80, 100)" style="background:rgb(30, 40, 80)"></div>

<!-- Kırmızı - Şarap Kırmızısı -->
<div class="color-selector" onclick="changeColor(140, 0, 0, 130)" style="background:rgb(140, 0, 0)"></div>

<!-- Bordo - Deep Burgundy -->
<div class="color-selector" onclick="changeColor(100, 10, 30, 120)" style="background:rgb(100, 10, 30)"></div>

<!-- Yeşil - British Racing Green -->
<div class="color-selector" onclick="changeColor(0, 70, 40, 100)" style="background:rgb(0, 70, 40)"></div>

<!-- Bej - Sandstone -->
<div class="color-selector" onclick="changeColor(200, 190, 160, 90)" style="background:rgb(200, 190, 160)"></div>

<!-- Mavi - Deniz Mavisi -->
<div class="color-selector" onclick="changeColor(60, 100, 160, 90)" style="background:rgb(60, 100, 160)"></div>

<!-- Altın - Champagne Gold -->
<div class="color-selector" onclick="changeColor(210, 190, 140, 80)" style="background:rgb(210, 190, 140)"></div>

<!-- Turuncu - Bronz -->
<div class="color-selector" onclick="changeColor(180, 100, 50, 90)" style="background:rgb(180, 100, 50)"></div>

                    </div>
                    <div class="test-button">
                        <div></div>
                    </div>
                    <div class="prices-infos">
                
                        <div class="buy-button"></div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
        <script src="js/app.js" type="text/javascript"></script>
    </body>
</html>
