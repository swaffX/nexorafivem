<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Markets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="market-container" class="hidden">
        <!-- Market Interface -->
        <div id="market-interface" class="market-window">
            <div class="market-header">
                <h2 id="market-title">Teknoloji Marketi</h2>
            </div>
            
            <div class="market-content">
                <!-- Left Side - Cart -->
                <div class="cart-section">
                    <div class="cart-header">
                        <h3>Sepet</h3>
                    </div>
                    
                    <div class="cart-items" id="cart-items">
                        <!-- Cart items will be populated by JavaScript -->
                    </div>
                    
                    <div class="cart-total-section">
                        <div class="cart-total-amount" id="cart-total"></div>
                    </div>
                </div>
                
                <!-- Right Side - Items and Controls -->
                <div class="items-section">
                    <div class="market-controls">
                        <div class="search-container">
                            <input type="text" id="search-input" placeholder="Bir şeyler ara..." class="search-input">
                        </div>
                    </div>
                    
                    <div class="items-grid" id="items-grid">
                        <!-- Items will be populated by JavaScript -->
                    </div>
                </div>
            </div>
            
            <!-- Bottom Actions -->
            <div class="cart-actions">
                <button id="pay-btn" class="pay-btn">Öde</button>
                <button id="clear-cart-btn" class="clear-cart-btn">Sepeti Temizle</button>
                <button id="exit-btn" class="exit-btn">Çıkış</button>
            </div>
        </div>
        
        <!-- Payment Interface -->
        <div id="payment-interface" class="payment-window hidden">
            <div class="payment-header">
                <h2>Ödeme Ekranı</h2>
            </div>
            
            <div class="payment-content">
                <div class="payment-left">
                    <h3>Seçenekler</h3>
                    <div class="payment-options">
                        <button class="payment-option" data-method="cash">Nakit</button>
                        <button class="payment-option" data-method="bank">Banka Kartı</button>
                    </div>
                </div>
                
                <div class="payment-right">    
                    <div class="payment-total-section">
                        <div class="payment-total-label">Toplam</div>
                        <div class="payment-total-amount" id="payment-total">$999.00</div>
                    </div>
                </div>
            </div>
            
            <div class="payment-actions">
                <button id="cancel-payment-btn" class="cancel-btn">İptal</button>
                <button id="confirm-payment-btn" class="confirm-btn">Öde</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
