            <div class="solMenu">

                <div class="kaydir" id="yatirID">
                    <input type="number" class="textislemler" id="yatirText">
                    <button class="yapbutton" id="parayiYatir"><i class="fas fa-arrow-right"></i></button>
                </div>
                <a type="button" class="buttonislemler" href="#cekID"><img src="./icons/withdraw.png" alt="" style="width: 50px; height: 40px; vertical-align: middle; position: relative; top: 2px;"></i>  Para Çek</a>

                <div class="kaydiruzun" id="transferID">
                    <input type="number" class="textislemler" id="targetAmount"  placeholder="Tutar girin">
                    <input type="text" class="textislemler" id="targetIBAN" placeholder="IBAN" style="text-transform: uppercase;">
                    <button class="yapbutton" id="IBANParaGonder"><i class="fas fa-arrow-right"></i></button>
                </div>
                <button type="button" class="buttonislemler" id="cikis"><img src="./icons/exit.png" alt="" style="width: 50px; height: 40px; vertical-align: middle; position: relative; top: 2px;"></i>  Çıkış Yap</button>
            </div>
            <div class="ortaMenu">
                <div class="ortaUst">
                    <p class="hesapBakiyesi"><b>Bakiye</b></p>
                    <p id="playerMoneyAmount"></p>
