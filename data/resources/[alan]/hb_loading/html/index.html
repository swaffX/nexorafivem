<html>
<head>
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<link rel="stylesheet" href="css/style.css">
</head>

<body>
<!-- BACKGROUND VIDEO -->
<div id="overlay">
<div class="fullscreen-bg">
    <video loop muted autoplay poster="img/videoframe.jpg" class="fullscreen-bg__video">
        <source src="assets/bgvideo.mp4" type="video/mp4">
    </video>
</div>
</div>
<!-- END BG VIDEO -->
<!-- LOGO -->
<img src="assets/logo.png" alt="" />
<!-- END LOGO -->
<!-- BG AUDIO -->
<!-- END BG AUDIO -->
<!-- LOADING BAR -->
<!-- LOADING BAR KALDIRILDI -->
<script src="js/main.js"></script>
<!-- LOADING INFO -->
<div id="loading-info" style="position:fixed; bottom:30px; right:30px; background:rgba(0,0,0,0.7); color:#fff; padding:12px 24px; border-radius:8px; font-size:18px; z-index:1000; font-family:'Raleway',sans-serif; display:flex; align-items:center; gap:12px;">
  <span id="loading-spinner" style="display:inline-block; width:24px; height:24px; border:4px solid #fff; border-top:4px solid #888; border-radius:50%; animation: spin 1s linear infinite;"></span>
  <span>Yükleniyor...</span>
</div>
<style>
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
<div id="press-space-info" style="display:none; position:fixed; bottom:30px; right:30px; background:rgba(0,0,0,0.7); color:#fff; padding:12px 24px; border-radius:8px; font-size:18px; z-index:1000; font-family:'Raleway',sans-serif;">Devam etmek için <b>SPACE</b>'e bas</div>
</body>
</html>
