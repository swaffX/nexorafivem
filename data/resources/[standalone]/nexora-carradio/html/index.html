<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Car Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <!-- Header -->
        <div class="menu-header">
            <div class="header-title">Araç Hoparlör Sistemi</div>
            <div class="header-controls">
                <div class="header-btn minimize">
                    <i class="fas fa-plus"></i>
                </div>
                <div class="header-btn close" onclick="closeMenu()">
                    <i class="fas fa-times"></i>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div id="buttons">
            <!-- URL Girişi -->
            <div class="menu-item">
                <div class="item-content">
                    <div class="item-header">YouTube URL</div>
                    <div class="item-desc">
                        <input type="text" id="musicUrl" placeholder="https://youtube.com/watch?v=..." class="url-input" />
                    </div>
                </div>
            </div>

            <div class="menu-item clickable" onclick="playMusic()">
                <div class="item-content">
                    <div class="item-header">Müzik Çal</div>
                    <div class="item-desc">YouTube linkini çal</div>
                </div>
            </div>

            <!-- Kontroller -->
            <div class="menu-item clickable" onclick="pauseMusic()">
                <div class="item-content">
                    <div class="item-header">Duraklat</div>
                    <div class="item-desc">Müziği duraklat</div>
                </div>
            </div>

            <div class="menu-item clickable" onclick="resumeMusic()">
                <div class="item-content">
                    <div class="item-header">Devam Ettir</div>
                    <div class="item-desc">Müziği devam ettir</div>
                </div>
            </div>

            <div class="menu-item clickable danger" onclick="stopMusic()">
                <div class="item-content">
                    <div class="item-header">Durdur</div>
                    <div class="item-desc">Müziği tamamen durdur</div>
                </div>
            </div>

            <!-- Ses Seviyesi -->
            <div class="menu-item">
                <div class="item-content">
                    <div class="item-header">Ses Seviyesi: <span id="volumeValue">50</span>%</div>
                    <input type="range" id="volumeSlider" min="0" max="100" value="50" oninput="changeVolume(this.value)" />
                </div>
            </div>

            <!-- Bass -->
            <div class="menu-item">
                <div class="item-content">
                    <div class="item-header">Bass: <span id="bassValue">0</span></div>
                    <input type="range" id="bassSlider" min="-10" max="10" value="0" oninput="changeBass(this.value)" />
                </div>
            </div>

            <!-- Tiz -->
            <div class="menu-item">
                <div class="item-content">
                    <div class="item-header">Tiz: <span id="trebleValue">0</span></div>
                    <input type="range" id="trebleSlider" min="-10" max="10" value="0" oninput="changeTreble(this.value)" />
                </div>
            </div>

            <!-- Playlist Başlık -->
            <div class="menu-item title">
                <div class="item-content">
                    <div class="item-header">Geçmiş Şarkılar</div>
                </div>
            </div>

            <!-- Playlist -->
            <div id="playlist"></div>

            <!-- Temizle -->
            <div class="menu-item clickable danger" onclick="clearPlaylist()">
                <div class="item-content">
                    <div class="item-header">Playlist Temizle</div>
                    <div class="item-desc">Tüm geçmişi sil</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
