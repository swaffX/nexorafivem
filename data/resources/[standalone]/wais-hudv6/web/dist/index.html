<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React</title>
    <script type="module" crossorigin src="script.js"></script>
    <link rel="stylesheet" crossorigin href="../public/css/style.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- CarPlay Widget -->
    <div id="carplay-widget">
      <div class="cp-thumb">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12-3c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z" stroke="#5ac8fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="cp-info">
        <div class="cp-label">
          <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#5ac8fa"/></svg>
          CARPLAY
        </div>
        <div class="cp-title" id="cp-title">Bilinmiyor</div>
        <div class="cp-status" id="cp-status">Çalıyor</div>
        <div class="cp-time-row">
          <span class="cp-time-label" id="cp-time-current">00:00</span>
          <div class="cp-progress-bar"><div class="cp-progress-fill" id="cp-progress-fill"></div></div>
          <span class="cp-time-label" id="cp-time-total">--:--</span>
        </div>
      </div>
      <div class="cp-controls">
        <div class="cp-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </div>
        <div class="cp-btn cp-btn-main" id="cp-playpause-btn">
          <svg id="cp-icon-pause" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
          <svg id="cp-icon-play" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="cp-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        </div>
      </div>
    </div>

    <script>
    (function() {
      var widget = document.getElementById('carplay-widget');
      var cpTitle = document.getElementById('cp-title');
      var cpStatus = document.getElementById('cp-status');
      var cpFill = document.getElementById('cp-progress-fill');
      var cpTimeCurrent = document.getElementById('cp-time-current');
      var cpTimeTotal = document.getElementById('cp-time-total');
      var iconPause = document.getElementById('cp-icon-pause');
      var iconPlay = document.getElementById('cp-icon-play');

      var timerInterval = null;
      var elapsedSeconds = 0;
      var pausedAt = 0;

      function fmt(s) {
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
      }

      function setPaused(p) {
        iconPause.style.display = p ? 'none' : '';
        iconPlay.style.display = p ? '' : 'none';
      }

      function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(function() {
          elapsedSeconds++;
          cpTimeCurrent.textContent = fmt(elapsedSeconds);
          var pct = Math.min((elapsedSeconds / 240) * 100, 100);
          cpFill.style.width = pct + '%';
        }, 1000);
      }

      function stopTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
      }

      function resetTimer() {
        stopTimer();
        elapsedSeconds = 0;
        cpTimeCurrent.textContent = '00:00';
        cpFill.style.width = '0%';
      }

      window.addEventListener('message', function(event) {
        var data = event.data;
        if (!data || data.type !== 'CARPLAY_UPDATE') return;

        if (data.state === 'stopped') {
          widget.classList.remove('cp-show');
          resetTimer();
        } else if (data.state === 'paused') {
          widget.classList.add('cp-show');
          if (data.title) cpTitle.textContent = data.title;
          cpStatus.textContent = 'Duraklatıldı';
          setPaused(true);
          stopTimer();
        } else {
          var isNewSong = data.title && cpTitle.textContent !== data.title;
          if (isNewSong) resetTimer();
          widget.classList.add('cp-show');
          cpTitle.textContent = data.title || cpTitle.textContent;
          cpStatus.textContent = 'Çalıyor';
          setPaused(false);
          startTimer();
        }
      });
    })();
    </script>
  </body>
</html>
