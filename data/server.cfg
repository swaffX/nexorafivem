## You CAN edit the following:
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
sv_maxclients 32
set steam_webApiKey "none"
sets tags "default, deployer, qbcore, qb-core"

## You MAY edit the following:
sv_licenseKey "cfxk_z1RMik0DczCYjR8GOqVw_lA23L"
sv_hostname "Nexora Roleplay"
sets sv_projectName "discord.gg/Nexora"
sets sv_projectDesc "Nexora Roleplay"
sets locale "tr-TR" # replace with your language and location code, like en-US, pt-BR, etc
load_server_icon myLogo.png
sv_enforceGameBuild 3258 #DLC The Chop Shop
set resources_useSystemChat false

# Database Connection String
set mysql_connection_string "mysql://nexora:Nexora123!@127.0.0.1/temelpaket?charset=utf8mb4"

# Developer Mode (for debugging)
setr game_enableFlyThroughWindscreen false

# Voice config
setr voice_useNativeAudio true
setr voice_useSendingRangeOnly true
setr voice_defaultCycle "GRAVE"
setr voice_defaultVolume 0.3
setr voice_enableRadioAnim 1
setr voice_syncData 1

# QBCore locale config
setr qb_locale "en"

# QBCore UseTarget
setr UseTarget true

# These resources will start by default.
start izzy_loading
ensure mapmanager
ensure spawnmanager
ensure sessionmanager
ensure basic-gamemode
ensure hardcap
ensure baseevents

# QBCore & Extra stuff
start ox_lib

# Load qb-core FIRST
ensure qb-core

# Then load [qb] folder
ensure [exe-eklenti]

# Then load remaining resources
ensure [alan] 
ensure [qb]
ensure [standalone]
ensure xsound
ensure [voice]
ensure [defaultmaps]
ensure [maps]
ensure [stream]
ensure [arabalar]
start RoadsOfEuropeDE
# svgui removed: invalid command

# NPC Density Control removed and replaced by nexora-density inside [standalone]

# Jobs / Meslekler
ensure [meslek]

# Custom MLO Maps / Özel Haritalar
ensure [mlo]

# Not: tired-selektor, gct-animposv2, nexora-perfmon, nexora-vinewood
# [standalone] klasörü içinde oldukları için otomatik yüklenir (satır 72: ensure [standalone])
# wonev-burgershot ise [meslek] içinde olduğu için otomatik yüklenir (satır 85: ensure [meslek])


## Permissions ##
add_ace group.admin command allow # allow all commands

# Adminler
add_principal identifier.fivem:17492281 group.admin # swaff
add_principal identifier.fivem:18812042 group.admin # oguz

# Resources
add_ace resource.qb-core command allow # Allow qb-core to execute commands

# Gods
add_ace qbcore.god command allow # Allow all commands

# Inheritance
add_principal qbcore.god group.admin # Allow gods access to the main admin group
add_principal qbcore.god qbcore.admin # Allow gods access to admin commands
add_principal qbcore.admin qbcore.mod # Allow admins access to mod commands
